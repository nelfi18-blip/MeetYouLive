<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!--
      Heart shape formula (M + two semicircle arcs + two quadratic beziers):
        M lx,ey  A r,r 0 0 0 cx,ey  A r,r 0 0 0 rx,ey  Q rx,cy tx,ty  Q lx,cy lx,ey  Z
      where lx=cx-r, rx=cx+r (left/right edge), ey=bump equator, ty=tip y, cy=curve control y

      Pink  : r=14, cx=50 → lx=22, rx=78, ey=45, ty=87, cy=66   spans x 22-78
      Purple: r=13, cx=63 → lx=37, rx=89, ey=45, ty=84, cy=65   spans x 37-89
      Blue  : r=12, cx=75 → lx=51, rx=99, ey=45, ty=81, cy=64   spans x 51-99

      Arcs use sweep-flag=0 (CCW) so each arc curves UP, forming the bump top.
      Arc from (lx,ey) to (cx,ey) with r=half-width gives an exact semicircle. ✓
    -->

    <!-- Pink heart: radial highlight top-left for 3-D depth -->
    <radialGradient id="pg" cx="34" cy="36" r="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffbbee"/>
      <stop offset="35%"  stop-color="#ff0077"/>
      <stop offset="100%" stop-color="#880033"/>
    </radialGradient>
    <!-- Purple heart -->
    <radialGradient id="ug" cx="50" cy="36" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#dd99ff"/>
      <stop offset="35%"  stop-color="#8811cc"/>
      <stop offset="100%" stop-color="#440077"/>
    </radialGradient>
    <!-- Blue heart -->
    <radialGradient id="bg" cx="63" cy="36" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#aabbff"/>
      <stop offset="35%"  stop-color="#3344cc"/>
      <stop offset="100%" stop-color="#112277"/>
    </radialGradient>
    <!-- Orbit ring: pink → purple → blue -->
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff0077"/>
      <stop offset="30%"  stop-color="#cc33ff"/>
      <stop offset="65%"  stop-color="#5566ff"/>
      <stop offset="100%" stop-color="#3388ff"/>
    </linearGradient>

    <!-- Glow filters -->
    <!-- Pink: double-blur for maximum neon intensity -->
    <filter id="pGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"   result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Purple -->
    <filter id="uGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Blue -->
    <filter id="bGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Orbit ring -->
    <filter id="oGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Sparkles -->
    <filter id="sGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dots -->
    <filter id="dGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① BACK ORBIT ARC — upper semi-ellipse, behind all hearts -->
  <!-- ellipse center (60,78) rx=52 ry=12; sweep=0 → CCW → goes through (60,66) at top -->
  <path d="M 8,78 A 52,12 0 0 0 112,78"
        fill="none" stroke="url(#og)" stroke-width="2.5" opacity="0.6"
        filter="url(#oGlow)"/>

  <!-- ② BLUE HEART  (back, rightmost) -->
  <!-- r=12, cx=75, lx=51, rx=99, ey=45, ty=81, cy=64 -->
  <path d="M 51,45 A 12,12 0 0 0 75,45 A 12,12 0 0 0 99,45 Q 99,64 75,81 Q 51,64 51,45 Z"
        fill="url(#bg)" filter="url(#bGlow)"/>
  <!-- inner rim highlight (brighter edge along top of bumps) -->
  <path d="M 51,45 A 12,12 0 0 0 75,45 A 12,12 0 0 0 99,45"
        fill="none" stroke="rgba(180,210,255,0.35)" stroke-width="2" stroke-linecap="round"/>

  <!-- ③ PURPLE HEART  (middle) -->
  <!-- r=13, cx=63, lx=37, rx=89, ey=45, ty=84, cy=65 -->
  <path d="M 37,45 A 13,13 0 0 0 63,45 A 13,13 0 0 0 89,45 Q 89,65 63,84 Q 37,65 37,45 Z"
        fill="url(#ug)" filter="url(#uGlow)"/>
  <!-- inner rim highlight -->
  <path d="M 37,45 A 13,13 0 0 0 63,45 A 13,13 0 0 0 89,45"
        fill="none" stroke="rgba(220,180,255,0.35)" stroke-width="2" stroke-linecap="round"/>

  <!-- ④ PINK HEART  (front, leftmost, largest) -->
  <!-- r=14, cx=50, lx=22, rx=78, ey=45, ty=87, cy=66 -->
  <path d="M 22,45 A 14,14 0 0 0 50,45 A 14,14 0 0 0 78,45 Q 78,66 50,87 Q 22,66 22,45 Z"
        fill="url(#pg)" filter="url(#pGlow)"/>
  <!-- inner rim highlight: bright strip along left bump top -->
  <path d="M 22,45 A 14,14 0 0 0 50,45"
        fill="none" stroke="rgba(255,210,240,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- secondary shine stroke inside the heart body -->
  <path d="M 29,51 Q 31,41 40,37"
        fill="none" stroke="rgba(255,220,245,0.45)" stroke-width="2" stroke-linecap="round"/>

  <!-- ⑤ FRONT ORBIT ARC — lower semi-ellipse, in front of hearts -->
  <!-- sweep=1 → CW → goes through (60,90) at bottom -->
  <path d="M 8,78 A 52,12 0 0 1 112,78"
        fill="none" stroke="url(#og)" stroke-width="3.5"
        filter="url(#oGlow)"/>

  <!-- Orbit endpoint glow dots -->
  <circle cx="8"   cy="78" r="4"   fill="#ff1188" filter="url(#dGlow)"/>
  <circle cx="112" cy="78" r="3.5" fill="#aaccff" filter="url(#dGlow)"/>

  <!-- ⑥ VIDEO CAMERA BADGE — centered at (63, 57) -->
  <!-- dark rounded-rect badge -->
  <rect x="50" y="48" width="27" height="18" rx="5" fill="#440055" opacity="0.92"/>
  <!-- camera body (hot-pink rounded rect) -->
  <rect x="52" y="51" width="15" height="11" rx="2.5" fill="#ff1188"/>
  <!-- lens: outer dark ring, inner dark, glint -->
  <circle cx="59.5" cy="56.5" r="4.5" fill="#880033"/>
  <circle cx="59.5" cy="56.5" r="2.8" fill="#440011"/>
  <circle cx="58.3" cy="55.3" r="1"   fill="rgba(255,255,255,0.5)"/>
  <!-- viewfinder triangle -->
  <polygon points="68,52 68,62 76,57" fill="#ff1188"/>

  <!-- ⑦ SPARKLES -->
  <!-- Large 4-point white star — top-right -->
  <g transform="translate(98,20)" filter="url(#sGlow)">
    <line x1="0"    y1="-10" x2="0"    y2="10"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-10"  y1="0"   x2="10"   y2="0"   stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-6.5" y1="-6.5" x2="6.5" y2="6.5" stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>
    <line x1="6.5"  y1="-6.5" x2="-6.5" y2="6.5" stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>
  </g>
  <!-- Small pink cross — top-left -->
  <g transform="translate(17,25)" filter="url(#sGlow)">
    <line x1="0"   y1="-6.5" x2="0"   y2="6.5" stroke="#ff88cc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6.5" y1="0"   x2="6.5" y2="0"   stroke="#ff88cc" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- ⑧ SCATTER DOTS -->
  <circle cx="97"  cy="32" r="2"   fill="#8855ff" opacity="0.85" filter="url(#dGlow)"/>
  <circle cx="107" cy="47" r="1.3" fill="#5577ff" opacity="0.75"/>
  <circle cx="103" cy="62" r="1"   fill="#6688ff" opacity="0.55"/>
  <circle cx="20"  cy="57" r="1.2" fill="#ff66cc" opacity="0.65"/>
  <circle cx="25"  cy="71" r="1"   fill="#ff44aa" opacity="0.55"/>
  <circle cx="32"  cy="33" r="1.2" fill="#cc44ff" opacity="0.50"/>
  <circle cx="91"  cy="89" r="1.2" fill="#4444ff" opacity="0.60"/>
</svg>
