<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="heartPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
    <linearGradient id="heartBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d78" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e040fb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer orbital ring -->
  <ellipse cx="60" cy="57" rx="51" ry="23" fill="none" stroke="url(#orbitGrad)" stroke-width="2.5" stroke-linecap="round" transform="rotate(-18 60 57)" opacity="0.85" filter="url(#glow)"/>

  <!-- Blue/purple heart (back, offset right) -->
  <path d="M72,65 C72,65 50,52 50,39 C50,32.4 55.4,27 62,27 C65.8,27 69.2,28.9 72,32 C74.8,28.9 78.2,27 82,27 C88.6,27 94,32.4 94,39 C94,52 72,65 72,65 Z"
        fill="url(#heartBlue)" filter="url(#glow)" opacity="0.88"/>

  <!-- Pink/magenta heart (front, offset left) -->
  <path d="M48,63 C48,63 26,50 26,37 C26,30.4 31.4,25 38,25 C41.8,25 45.2,26.9 48,30 C50.8,26.9 54.2,25 58,25 C64.6,25 70,30.4 70,37 C70,50 48,63 48,63 Z"
        fill="url(#heartPink)" filter="url(#glowStrong)"/>

  <!-- Highlight on pink heart -->
  <path d="M33,30 C31.5,28 29.5,28.5 28.5,30.5" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Sparkle top-right (large) -->
  <g transform="translate(91,21)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#ff2d78" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#ff2d78" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="#ff2d78" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="#ff2d78" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Sparkle top-left (small) -->
  <g transform="translate(22,17)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#e040fb" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#e040fb" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Sparkle right (small blue) -->
  <g transform="translate(101,49)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Glow dots on orbit endpoints -->
  <circle cx="106" cy="49" r="3" fill="#ff2d78" opacity="0.9" filter="url(#glow)"/>
  <circle cx="14" cy="64" r="2.5" fill="#60a5fa" opacity="0.85" filter="url(#glow)"/>
</svg>
