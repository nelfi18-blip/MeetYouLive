<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Badge background: deep space dark purple -->
    <radialGradient id="bgG" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#1e0042"/>
      <stop offset="100%" stop-color="#06000f"/>
    </radialGradient>

    <!-- Left heart stroke gradient: magenta → violet -->
    <linearGradient id="heartGL" x1="21" y1="17" x2="67" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff1177"/>
      <stop offset="50%"  stop-color="#cc00ff"/>
      <stop offset="100%" stop-color="#7700cc"/>
    </linearGradient>

    <!-- Right heart stroke gradient: pink → electric violet → indigo -->
    <linearGradient id="heartGR" x1="53" y1="17" x2="99" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff66cc"/>
      <stop offset="55%"  stop-color="#bb00ff"/>
      <stop offset="100%" stop-color="#4422ff"/>
    </linearGradient>

    <!-- Left heart subtle fill -->
    <linearGradient id="fillGL" x1="21" y1="17" x2="67" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff1177" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7700cc" stop-opacity="0.07"/>
    </linearGradient>

    <!-- Right heart subtle fill -->
    <linearGradient id="fillGR" x1="53" y1="17" x2="99" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff66cc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4422ff" stop-opacity="0.07"/>
    </linearGradient>

    <!-- Badge border: magenta → violet → cyan (diagonal) -->
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff0066" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#9900ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00ffee" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Heart neon glow: wide halo + tight inner + source -->
    <filter id="hglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"   result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Video icon glow (cyan) -->
    <filter id="vcglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- LIVE dot glow -->
    <filter id="lglow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① DARK CIRCULAR BADGE -->
  <circle cx="60" cy="60" r="52" fill="url(#bgG)"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#borderG)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!--
    ② LEFT HEART — centered at approx (44, 40), bounding box [21,17]→[67,63]
    Tip at (44,63), cleft at (52,17) shared edge with right heart's (52,17).
  -->
  <!-- subtle fill so the heart shape reads clearly -->
  <path d="M 44,63
           C 25,51 21,38 21,31
           C 21,21 29,17 36,17
           C 40,17 43,21 44,26
           C 45,21 48,17 52,17
           C 59,17 67,21 67,31
           C 67,38 63,51 44,63 Z"
        fill="url(#fillGL)"/>
  <!-- neon outline -->
  <path d="M 44,63
           C 25,51 21,38 21,31
           C 21,21 29,17 36,17
           C 40,17 43,21 44,26
           C 45,21 48,17 52,17
           C 59,17 67,21 67,31
           C 67,38 63,51 44,63 Z"
        fill="none" stroke="url(#heartGL)" stroke-width="3.5" stroke-linejoin="round"
        filter="url(#hglow)"/>

  <!--
    ③ RIGHT HEART — centered at approx (76, 40), bounding box [53,17]→[99,63]
    Left inner edge (53,17) touches the right inner edge of the left heart.
  -->
  <!-- subtle fill -->
  <path d="M 76,63
           C 57,51 53,38 53,31
           C 53,21 61,17 68,17
           C 72,17 75,21 76,26
           C 77,21 80,17 84,17
           C 91,17 99,21 99,31
           C 99,38 95,51 76,63 Z"
        fill="url(#fillGR)"/>
  <!-- neon outline -->
  <path d="M 76,63
           C 57,51 53,38 53,31
           C 53,21 61,17 68,17
           C 72,17 75,21 76,26
           C 77,21 80,17 84,17
           C 91,17 99,21 99,31
           C 99,38 95,51 76,63 Z"
        fill="none" stroke="url(#heartGR)" stroke-width="3.5" stroke-linejoin="round"
        filter="url(#hglow)"/>

  <!--
    ④ MODERN VIDEO CALL ICON
    Camera body (rounded rect) + right-pointing triangle (camera head).
    Centered at ≈(60, 80), electric cyan to contrast with magenta hearts.
  -->
  <g filter="url(#vcglow)">
    <!-- Camera body -->
    <rect x="42" y="71" width="24" height="17" rx="3.5"
          fill="#00ffee" fill-opacity="0.08"
          stroke="#00ffee" stroke-width="2.2"/>
    <!-- Camera notch (right-pointing triangle = "video" symbol) -->
    <path d="M 66,72.8 L 76,79.5 L 66,86.2 Z"
          fill="none" stroke="#00ffee" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- ⑤ LIVE INDICATOR DOT (top-right, glowing scarlet) -->
  <circle cx="88" cy="22" r="5.5" fill="#ff1144" filter="url(#lglow)"/>
  <circle cx="88" cy="22" r="2.5" fill="white"   opacity="0.92"/>
  <circle cx="88" cy="22" r="8.5" fill="none" stroke="#ff1144" stroke-width="1.2" opacity="0.4"/>

  <!-- ⑥ MINIMAL ACCENT DOTS -->
  <circle cx="30" cy="22" r="2"   fill="#ff55bb" opacity="0.6" filter="url(#lglow)"/>
  <circle cx="73" cy="91" r="1.5" fill="#5533ff" opacity="0.5"/>
  <circle cx="47" cy="93" r="1.2" fill="#cc33ff" opacity="0.5"/>
</svg>
