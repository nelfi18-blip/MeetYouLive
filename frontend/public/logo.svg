<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Heart stroke gradients -->
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0070"/>
      <stop offset="100%" stop-color="#ff66b2"/>
    </linearGradient>
    <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc22ff"/>
      <stop offset="100%" stop-color="#9911ee"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5533ff"/>
      <stop offset="100%" stop-color="#33aaff"/>
    </linearGradient>
    <!-- Orbit gradient -->
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0070"/>
      <stop offset="40%" stop-color="#ff88cc"/>
      <stop offset="60%" stop-color="#9977ff"/>
      <stop offset="100%" stop-color="#44aaff"/>
    </linearGradient>
    <!-- Pink neon glow (double-blur for intensity) -->
    <filter id="fp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Purple neon glow -->
    <filter id="fu" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Blue neon glow -->
    <filter id="fb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Orbit glow -->
    <filter id="fo" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sparkle glow -->
    <filter id="fs" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot glow -->
    <filter id="fd" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === BACK ORBIT ARC (behind all hearts) === -->
  <path d="M 8,68 A 52,13 0 0 0 112,68"
        fill="none" stroke="#4433bb" stroke-width="2.5" opacity="0.75" filter="url(#fb)"/>

  <!-- === BLUE HEART (back, right-shifted, center ~72,50) === -->
  <path d="M 72,85 C 47,68 34,52 34,37 C 34,23 43,15 53,15 C 59,15 65,18 72,25 C 79,18 85,15 91,15 C 101,15 110,23 110,37 C 110,52 97,68 72,85 Z"
        fill="none" stroke="url(#bg2)" stroke-width="5.5" filter="url(#fb)"/>
  <path d="M 72,85 C 47,68 34,52 34,37 C 34,23 43,15 53,15 C 59,15 65,18 72,25 C 79,18 85,15 91,15 C 101,15 110,23 110,37 C 110,52 97,68 72,85 Z"
        fill="none" stroke="#99bbff" stroke-width="1.5" opacity="0.5"/>

  <!-- === PURPLE HEART (middle, center ~61,47) === -->
  <path d="M 61,82 C 37,65 24,49 24,35 C 24,21 33,13 43,13 C 49,13 55,16 61,23 C 67,16 73,13 79,13 C 89,13 98,21 98,35 C 98,49 85,65 61,82 Z"
        fill="none" stroke="url(#ug)" stroke-width="5.5" filter="url(#fu)"/>
  <path d="M 61,82 C 37,65 24,49 24,35 C 24,21 33,13 43,13 C 49,13 55,16 61,23 C 67,16 73,13 79,13 C 89,13 98,21 98,35 C 98,49 85,65 61,82 Z"
        fill="none" stroke="#cc88ff" stroke-width="1.5" opacity="0.5"/>

  <!-- === PINK HEART (front, left-shifted, center ~50,52) === -->
  <path d="M 50,90 C 24,72 10,55 10,39 C 10,24 20,15 31,15 C 37.5,15 44,18.5 50,26 C 56,18.5 62.5,15 69,15 C 80,15 90,24 90,39 C 90,55 76,72 50,90 Z"
        fill="none" stroke="url(#pg)" stroke-width="6.5" filter="url(#fp)"/>
  <path d="M 50,90 C 24,72 10,55 10,39 C 10,24 20,15 31,15 C 37.5,15 44,18.5 50,26 C 56,18.5 62.5,15 69,15 C 80,15 90,24 90,39 C 90,55 76,72 50,90 Z"
        fill="none" stroke="#ffaadd" stroke-width="2" opacity="0.65"/>

  <!-- === VIDEO CAMERA ICON (center intersection ~63,44) === -->
  <rect x="50" y="37" width="22" height="15" rx="3" fill="#bb0055"/>
  <circle cx="60" cy="44.5" r="4.5" fill="#880033"/>
  <circle cx="60" cy="44.5" r="2.2" fill="#440022"/>
  <polygon points="73,39.5 73,49.5 81,44.5" fill="#ff1177"/>
  <circle cx="63" cy="38.5" r="1.5" fill="#ff4444" opacity="0.9"/>

  <!-- === FRONT ORBIT ARC (in front of hearts) === -->
  <path d="M 8,68 A 52,13 0 0 1 112,68"
        fill="none" stroke="url(#og)" stroke-width="3.5" filter="url(#fo)"/>

  <!-- Orbit endpoint dots -->
  <circle cx="8" cy="68" r="4" fill="#ff0070" filter="url(#fd)"/>
  <circle cx="112" cy="68" r="3.5" fill="#aaccff" filter="url(#fd)"/>

  <!-- === SPARKLES === -->
  <!-- Large 4-pointed star (top-right) -->
  <g transform="translate(100,18)" filter="url(#fs)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Small pink sparkle (top-left) -->
  <g transform="translate(17,14)" filter="url(#fs)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ff55aa" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#ff55aa" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- Small blue-purple sparkle (right side) -->
  <g transform="translate(107,40)" filter="url(#fs)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#9988ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#9988ff" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Scatter accent dots -->
  <circle cx="100" cy="30" r="1.5" fill="#7755ff" opacity="0.85" filter="url(#fd)"/>
  <circle cx="15" cy="72" r="1.5" fill="#ff88bb" opacity="0.75"/>
  <circle cx="26" cy="24" r="1.2" fill="#ff44cc" opacity="0.7"/>
  <circle cx="106" cy="55" r="1.2" fill="#8899ff" opacity="0.7"/>
</svg>
