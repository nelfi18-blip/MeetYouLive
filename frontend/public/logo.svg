<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" fill="none">
  <defs>
    <!-- LEFT HEART dark fill (hot pink interior) -->
    <radialGradient id="lhFill" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#3a0020"/>
      <stop offset="100%" stop-color="#140009"/>
    </radialGradient>

    <!-- RIGHT HEART dark fill (indigo interior) -->
    <radialGradient id="rhFill" cx="55%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#150030"/>
      <stop offset="100%" stop-color="#050010"/>
    </radialGradient>

    <!-- ORBITAL RING gradient: pink → violet → blue -->
    <linearGradient id="oG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff0088"/>
      <stop offset="45%"  stop-color="#aa22ff"/>
      <stop offset="100%" stop-color="#1166ff"/>
    </linearGradient>

    <!-- TAGLINE gradient -->
    <linearGradient id="tG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff22aa"/>
      <stop offset="50%"  stop-color="#ee55ff"/>
      <stop offset="100%" stop-color="#ff22aa"/>
    </linearGradient>

    <!-- PINK neon glow (for left heart) -->
    <filter id="fP" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- BLUE neon glow (for right heart) -->
    <filter id="fB" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ORBIT glow -->
    <filter id="fO" x="-5%" y="-180%" width="110%" height="460%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- CAMERA glow -->
    <filter id="fC" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- SPARKLE glow -->
    <filter id="fS" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ② ORBITAL RING — BACK ARC (behind hearts, passes through top)
       Ellipse center (200,218), rx=183, ry=28
       sweep=0 → CCW in screen-space → goes through top (200,190) -->
  <path d="M 17,218 A 183,28 0 0 0 383,218"
        fill="none" stroke="url(#oG)" stroke-width="3" opacity="0.5"
        filter="url(#fO)"/>

  <!-- ③ RIGHT HEART — blue/violet, behind left heart
       cx=250, cy=132 | tip=(250,192) | left=163 right=337 | lobes top y≈78 -->
  <path d="M 250,192
           C 210,183  163,162  163,132
           C 163,94   218,80   250,120
           C 282,80   337,94   337,132
           C 337,162  290,183  250,192 Z"
        fill="url(#rhFill)"/>
  <g filter="url(#fB)">
    <!-- outer diffuse glow -->
    <path d="M 250,192
             C 210,183  163,162  163,132
             C 163,94   218,80   250,120
             C 282,80   337,94   337,132
             C 337,162  290,183  250,192 Z"
          fill="none" stroke="#5500cc" stroke-width="20" stroke-opacity="0.25"/>
    <!-- main tube -->
    <path d="M 250,192
             C 210,183  163,162  163,132
             C 163,94   218,80   250,120
             C 282,80   337,94   337,132
             C 337,162  290,183  250,192 Z"
          fill="none" stroke="#6622ee" stroke-width="9"/>
    <!-- bright edge -->
    <path d="M 250,192
             C 210,183  163,162  163,132
             C 163,94   218,80   250,120
             C 282,80   337,94   337,132
             C 337,162  290,183  250,192 Z"
          fill="none" stroke="#9955ff" stroke-width="4.5"/>
    <!-- inner highlight shimmer -->
    <path d="M 250,192
             C 210,183  163,162  163,132
             C 163,94   218,80   250,120
             C 282,80   337,94   337,132
             C 337,162  290,183  250,192 Z"
          fill="none" stroke="#ccbbff" stroke-width="1.8" opacity="0.6"/>
  </g>

  <!-- ④ LEFT HEART — pink/magenta, front layer
       cx=156, cy=148 | tip=(156,203) | left=62 right=250 | lobes top y≈90 -->
  <path d="M 156,203
           C 116,194  62,172   62,143
           C 62,104   118,90  156,133
           C 194,90   250,104 250,143
           C 250,172  196,194 156,203 Z"
        fill="url(#lhFill)"/>
  <g filter="url(#fP)">
    <!-- outer diffuse glow -->
    <path d="M 156,203
             C 116,194  62,172   62,143
             C 62,104   118,90  156,133
             C 194,90   250,104 250,143
             C 250,172  196,194 156,203 Z"
          fill="none" stroke="#dd0066" stroke-width="20" stroke-opacity="0.25"/>
    <!-- main tube -->
    <path d="M 156,203
             C 116,194  62,172   62,143
             C 62,104   118,90  156,133
             C 194,90   250,104 250,143
             C 250,172  196,194 156,203 Z"
          fill="none" stroke="#ff0088" stroke-width="9"/>
    <!-- bright edge -->
    <path d="M 156,203
             C 116,194  62,172   62,143
             C 62,104   118,90  156,133
             C 194,90   250,104 250,143
             C 250,172  196,194 156,203 Z"
          fill="none" stroke="#ff44bb" stroke-width="4.5"/>
    <!-- inner highlight shimmer -->
    <path d="M 156,203
             C 116,194  62,172   62,143
             C 62,104   118,90  156,133
             C 194,90   250,104 250,143
             C 250,172  196,194 156,203 Z"
          fill="none" stroke="#ffccee" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ⑤ ORBITAL RING — FRONT ARC (in front of hearts, passes through bottom)
       sweep=1 → CW → goes through bottom (200,246) -->
  <path d="M 17,218 A 183,28 0 0 1 383,218"
        fill="none" stroke="url(#oG)" stroke-width="4.5"
        filter="url(#fO)"/>

  <!-- Orbital endpoint glow dots -->
  <circle cx="17"  cy="218" r="5.5" fill="#ff0088" filter="url(#fS)"/>
  <circle cx="383" cy="218" r="4.5" fill="#1166ff" filter="url(#fS)"/>

  <!-- ⑥ VIDEO CAMERA ICON — centered at overlap zone (202, 143)
       Body: rounded rect; Lens: circle + dot; Head: right-pointing triangle -->
  <g filter="url(#fC)">
    <rect x="178" y="128" width="48" height="30" rx="7"
          fill="#2a0018" fill-opacity="0.9"
          stroke="#ff0088" stroke-width="2.5"/>
    <path d="M 226,134 L 240,143 L 226,152 Z"
          fill="#2a0018" fill-opacity="0.9"
          stroke="#ff0088" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="197" cy="143" r="9.5"
            fill="#1a0010" stroke="#ff55aa" stroke-width="2"/>
    <circle cx="197" cy="143" r="5"
            fill="#ff0066" opacity="0.95"/>
    <circle cx="194.5" cy="140.5" r="2.2"
            fill="white" opacity="0.45"/>
  </g>

  <!-- ⑦ SPARKLES — more stars scattered around the hearts -->

  <!-- Large 4-point star: top-right -->
  <g transform="translate(286,95)" filter="url(#fS)">
    <line x1="0"   y1="-15" x2="0"   y2="15"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-15" y1="0"   x2="15"  y2="0"   stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9"  y1="-9"  x2="9"   y2="9"   stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
    <line x1="9"   y1="-9"  x2="-9"  y2="9"   stroke="white" stroke-width="1"   stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Medium 4-point star: top-left -->
  <g transform="translate(110,112)" filter="url(#fS)">
    <line x1="0"   y1="-12" x2="0"   y2="12"  stroke="#ff88cc" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-12" y1="0"   x2="12"  y2="0"   stroke="#ff88cc" stroke-width="2"   stroke-linecap="round"/>
    <line x1="-7"  y1="-7"  x2="7"   y2="7"   stroke="#ff88cc" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
    <line x1="7"   y1="-7"  x2="-7"  y2="7"   stroke="#ff88cc" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Small 4-point star: lower-left -->
  <g transform="translate(55,68)" filter="url(#fS)">
    <line x1="0"  y1="-8" x2="0" y2="8"  stroke="#ff44aa" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-8" y1="0"  x2="8" y2="0"  stroke="#ff44aa" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5"  stroke="#ff44aa" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="5"  y1="-5" x2="-5" y2="5" stroke="#ff44aa" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Small 4-point star: upper-right of right heart -->
  <g transform="translate(345,75)" filter="url(#fS)">
    <line x1="0"  y1="-9" x2="0" y2="9"  stroke="#9966ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-9" y1="0"  x2="9" y2="0"  stroke="#9966ff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5"  stroke="#9966ff" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="5"  y1="-5" x2="-5" y2="5" stroke="#9966ff" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Tiny 4-point star: far right mid -->
  <g transform="translate(370,148)" filter="url(#fS)">
    <line x1="0"  y1="-6" x2="0" y2="6"  stroke="#4488ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0"  x2="6" y2="0"  stroke="#4488ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Tiny 4-point star: far left mid -->
  <g transform="translate(30,165)" filter="url(#fS)">
    <line x1="0"  y1="-6" x2="0" y2="6"  stroke="#ff66cc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0"  x2="6" y2="0"  stroke="#ff66cc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Tiny 4-point star: bottom-center area -->
  <g transform="translate(200,250)" filter="url(#fS)">
    <line x1="0"  y1="-6" x2="0" y2="6"  stroke="#ee99ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0"  x2="6" y2="0"  stroke="#ee99ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Tiny accent dots -->
  <circle cx="89"  cy="140" r="2.5" fill="#ff44aa" opacity="0.75" filter="url(#fS)"/>
  <circle cx="307" cy="122" r="2"   fill="#cc88ff" opacity="0.7"/>
  <circle cx="316" cy="170" r="1.8" fill="#4488ff" opacity="0.65"/>
  <circle cx="78"  cy="192" r="1.8" fill="#ff66bb" opacity="0.6"/>
  <circle cx="291" cy="87"  r="1.5" fill="#ddbbff" opacity="0.65"/>
  <circle cx="153" cy="60"  r="1.5" fill="#ffbbdd" opacity="0.55"/>
  <circle cx="240" cy="230" r="1.3" fill="#ff88cc" opacity="0.5"/>
  <circle cx="355" cy="200" r="1.3" fill="#8888ff" opacity="0.5"/>
  <circle cx="44"  cy="215" r="1.2" fill="#ff55aa" opacity="0.45"/>

  <!-- ⑦b ORBITING DOT — a glowing bead that travels the orbital ellipse -->
  <!-- Ellipse center (200,218), rx=183, ry=28 — the dot rides the same path as the ring -->
  <g filter="url(#fS)">
    <circle r="7" fill="#ff44cc" fill-opacity="0.95" stroke="white" stroke-width="1.5">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbitPath"/>
      </animateMotion>
    </circle>
    <!-- Inner core of the bead -->
    <circle r="3.5" fill="#ff88ff">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbitPath"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Hidden orbit path definition used by animateMotion -->
  <path id="orbitPath"
        d="M 17,218 A 183,28 0 0 1 383,218 A 183,28 0 0 1 17,218"
        fill="none" stroke="none" visibility="hidden"/>

  <!-- ⑧ WORDMARK -->
  <!-- "MeetYou" white + "Live" hot pink -->
  <text x="200" y="292"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="52"
        text-anchor="middle"
        fill="#1a0040">MeetYou<tspan fill="#ff0088">Live</tspan></text>

  <!-- Tagline: CONECTA • EN VIVO • VIVE -->
  <text x="200" y="324"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="600"
        font-size="13"
        text-anchor="middle"
        letter-spacing="4"
        fill="url(#tG)">CONECTA • EN VIVO • VIVE</text>
</svg>
