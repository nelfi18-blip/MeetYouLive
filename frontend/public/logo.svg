<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Badge background: deep space dark purple, highlight top-left -->
    <radialGradient id="bgG" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#1e0042"/>
      <stop offset="100%" stop-color="#06000f"/>
    </radialGradient>

    <!-- Heart: hot magenta → electric violet → deep indigo -->
    <linearGradient id="heartG" x1="22" y1="16" x2="98" y2="79" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff1177"/>
      <stop offset="50%"  stop-color="#cc00ff"/>
      <stop offset="100%" stop-color="#4400aa"/>
    </linearGradient>

    <!-- Play button: pure white → blush -->
    <radialGradient id="playG" cx="28%" cy="28%" r="75%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd0ee"/>
    </radialGradient>

    <!-- Orbit / signal: electric cyan → violet → magenta -->
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffee"/>
      <stop offset="35%"  stop-color="#9900ff"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </linearGradient>

    <!-- Badge border: magenta → violet → cyan (diagonal) -->
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff0066" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#9900ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00ffee" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Heart neon glow: wide outer + tight inner + source -->
    <filter id="hglow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"   result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orbit arc glow -->
    <filter id="oglow" x="-15%" y="-250%" width="130%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sparkle / star glow -->
    <filter id="sglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- LIVE dot glow -->
    <filter id="lglow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Signal arcs glow -->
    <filter id="sigglow" x="-100%" y="-60%" width="300%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① DARK CIRCULAR BADGE -->
  <circle cx="60" cy="60" r="52" fill="url(#bgG)"/>
  <!-- Gradient border ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#borderG)" stroke-width="2.5"/>
  <!-- Ultra-subtle inner sheen -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!-- ② BACK ORBIT ARC (upper half, behind heart) -->
  <!-- Tilted ellipse center ~(60,68), rx=54, ry=9, x-rot=3°, sweep=0 → CCW → arcs upward -->
  <path d="M 6,68 A 54,9 3 0 0 114,68"
        fill="none" stroke="url(#ringG)" stroke-width="1.5" opacity="0.5"
        filter="url(#oglow)"/>

  <!-- ③ HEART (filled, neon gradient + double-layer glow) -->
  <path d="M 60,79 C 36,63 22,47 22,36 C 22,24 31,16 41,16 C 48,16 54,20 60,28 C 66,20 72,16 79,16 C 89,16 98,24 98,36 C 98,47 84,63 60,79 Z"
        fill="url(#heartG)" filter="url(#hglow)"/>
  <!-- Top-left rim highlight: bright arc along left bump -->
  <path d="M 22,36 C 22,24 31,16 41,16 C 48,16 54,20 60,28"
        fill="none" stroke="rgba(255,180,230,0.45)" stroke-width="3" stroke-linecap="round"/>
  <!-- Subtle central depth shadow -->
  <path d="M 60,29 C 59,37 59,45 60,52"
        fill="none" stroke="rgba(80,0,60,0.30)" stroke-width="5" stroke-linecap="round"/>

  <!-- ④ PLAY TRIANGLE (white-blush, inside heart) -->
  <polygon points="50,42 50,68 76,55" fill="url(#playG)"/>
  <!-- Subtle dark inner shadow for 3-D depth -->
  <polygon points="53,46 53,64 69,55" fill="rgba(0,0,25,0.16)"/>

  <!-- ⑤ FRONT ORBIT ARC (lower half, in front of heart, thicker) -->
  <path d="M 6,68 A 54,9 3 0 1 114,68"
        fill="none" stroke="url(#ringG)" stroke-width="3"
        filter="url(#oglow)"/>
  <!-- Orbit endpoint glow dots -->
  <circle cx="6"   cy="68" r="4"   fill="#00ffee" filter="url(#sglow)"/>
  <circle cx="114" cy="68" r="3.5" fill="#ff0066" filter="url(#sglow)"/>

  <!-- ⑥ LIVE INDICATOR DOT (top-right, glowing scarlet) -->
  <circle cx="88" cy="21" r="5.5" fill="#ff1144" filter="url(#lglow)"/>
  <circle cx="88" cy="21" r="2.5" fill="white"   opacity="0.92"/>
  <!-- Pulse ring -->
  <circle cx="88" cy="21" r="8.5" fill="none" stroke="#ff1144" stroke-width="1.2" opacity="0.4"/>

  <!-- ⑦ BROADCAST / SIGNAL ARCS (right side, bowing rightward, CW sweep=1) -->
  <!-- Inner arc -->
  <path d="M 100,50 A 15,15 0 0 1 100,70"
        fill="none" stroke="#00ffee" stroke-width="2.5" stroke-linecap="round"
        filter="url(#sigglow)"/>
  <!-- Middle arc -->
  <path d="M 105,45 A 22,22 0 0 1 105,75"
        fill="none" stroke="#00ffee" stroke-width="1.8" stroke-linecap="round" opacity="0.6"
        filter="url(#sigglow)"/>
  <!-- Outer arc (extends slightly beyond badge — intentional broadcast effect) -->
  <path d="M 110,40 A 30,30 0 0 1 110,80"
        fill="none" stroke="#00ffee" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- ⑧ SPARKLES / STARS -->
  <!-- Large 4-point white star, top-right quadrant -->
  <g transform="translate(94,33)" filter="url(#sglow)">
    <line x1="0"    y1="-9"   x2="0"    y2="9"   stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9"   y1="0"    x2="9"    y2="0"   stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-5.5" y1="-5.5" x2="5.5"  y2="5.5" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
    <line x1="5.5"  y1="-5.5" x2="-5.5" y2="5.5" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Small pink cross, left side -->
  <g transform="translate(25,46)" filter="url(#sglow)">
    <line x1="0"   y1="-6" x2="0"  y2="6" stroke="#ff66cc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6"  y1="0"  x2="6"  y2="0" stroke="#ff66cc" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Tiny violet cross, lower area -->
  <g transform="translate(75,86)" filter="url(#sglow)">
    <line x1="0"    y1="-4.5" x2="0"    y2="4.5" stroke="#aa44ff" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-4.5" y1="0"    x2="4.5"  y2="0"   stroke="#aa44ff" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- ⑨ ACCENT SCATTER DOTS -->
  <circle cx="35"  cy="19" r="2"   fill="#ff55bb" opacity="0.8"  filter="url(#sglow)"/>
  <circle cx="72"  cy="89" r="1.5" fill="#5533ff" opacity="0.7"/>
  <circle cx="16"  cy="53" r="1.3" fill="#ff33aa" opacity="0.55"/>
  <circle cx="48"  cy="93" r="1.2" fill="#cc33ff" opacity="0.6"/>
  <circle cx="100" cy="85" r="1.2" fill="#00ddff" opacity="0.5"/>
</svg>
